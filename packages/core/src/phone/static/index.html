<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LDK Assistant - 手机文字输入</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 30px;
      width: 100%;
      max-width: 500px;
    }

    h1 {
      color: #333;
      font-size: 24px;
      margin-bottom: 10px;
      text-align: center;
    }

    .status {
      text-align: center;
      color: #666;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .status-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: #ccc;
      margin-right: 5px;
    }

    .status-dot.connected {
      background-color: #4caf50;
    }

    .input-group {
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      padding: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      font-family: inherit;
      resize: vertical;
      transition: border-color 0.3s;
    }

    textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    button {
      flex: 1;
      padding: 15px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-submit {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .btn-clear {
      background: #f5f5f5;
      color: #666;
    }

    .btn-clear:hover {
      background: #e0e0e0;
    }

    .result {
      background: #f9f9f9;
      border-radius: 10px;
      padding: 15px;
      margin-top: 20px;
      display: none;
    }

    .result.show {
      display: block;
    }

    .result-title {
      font-size: 14px;
      color: #666;
      margin-bottom: 10px;
    }

    .result-content {
      font-size: 16px;
      color: #333;
      line-height: 1.6;
    }

    .error {
      background: #ffebee;
      color: #c62828;
      padding: 15px;
      border-radius: 10px;
      margin-top: 20px;
      display: none;
    }

    .error.show {
      display: block;
    }

    .help {
      margin-top: 20px;
      padding: 15px;
      background: #e3f2fd;
      border-radius: 10px;
      font-size: 14px;
      color: #1565c0;
      line-height: 1.6;
    }

    .help strong {
      display: block;
      margin-bottom: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📱 LDK Assistant</h1>
    <div class="status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">连接中...</span>
    </div>

    <div class="input-group">
      <textarea
        id="textInput"
        placeholder="在此输入文字，或使用手机输入法的语音转文字功能..."
      ></textarea>
    </div>

    <div class="button-group">
      <button class="btn-clear" id="clearBtn">清除</button>
      <button class="btn-submit" id="submitBtn">提交</button>
    </div>

    <div class="result" id="result">
      <div class="result-title">处理结果：</div>
      <div class="result-content" id="resultContent"></div>
    </div>

    <div class="error" id="error"></div>

    <div class="help">
      <strong>💡 使用提示：</strong>
      前缀词"输入"→ 文字直接注入到电脑光标位置<br>
      前缀词"指令"→ 文字作为指令执行（v2 功能）<br>
      不加前缀词→ 默认为输入模式
    </div>
  </div>

  <script>
    let ws = null;
    const textInput = document.getElementById('textInput');
    const submitBtn = document.getElementById('submitBtn');
    const clearBtn = document.getElementById('clearBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const result = document.getElementById('result');
    const resultContent = document.getElementById('resultContent');
    const error = document.getElementById('error');

    // 获取 WebSocket 地址
    function getWebSocketUrl() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const host = window.location.hostname;
      const port = window.location.port || '80';
      return `${protocol}//${host}:${parseInt(port) + 1}`;
    }

    // 连接 WebSocket
    function connect() {
      const wsUrl = getWebSocketUrl();
      console.log('Connecting to:', wsUrl);

      ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        console.log('Connected to PhoneServer');
        statusDot.classList.add('connected');
        statusText.textContent = '已连接';
      };

      ws.onclose = () => {
        console.log('Disconnected from PhoneServer');
        statusDot.classList.remove('connected');
        statusText.textContent = '连接断开，尝试重连...';
        setTimeout(connect, 3000);
      };

      ws.onerror = (err) => {
        console.error('WebSocket error:', err);
        showError('连接错误，请检查网络');
      };

      ws.onmessage = (event) => {
        try {
          const message = JSON.parse(event.data);
          handleServerMessage(message);
        } catch (err) {
          console.error('Failed to parse message:', err);
        }
      };
    }

    // 处理服务端消息
    function handleServerMessage(message) {
      console.log('Received message:', message);

      switch (message.type) {
        case 'result':
          showResult(message.intent, message.text);
          break;
        case 'error':
          showError(message.message);
          break;
      }
    }

    // 显示结果
    function showResult(intent, text) {
      result.classList.add('show');
      error.classList.remove('show');

      const intentText = intent === 'input' ? '输入模式' : '指令模式';
      resultContent.innerHTML = `<strong>${intentText}</strong><br>${text}`;

      // 3秒后自动隐藏结果
      setTimeout(() => {
        result.classList.remove('show');
      }, 3000);
    }

    // 显示错误
    function showError(message) {
      error.classList.add('show');
      result.classList.remove('show');
      error.textContent = message;

      // 5秒后自动隐藏错误
      setTimeout(() => {
        error.classList.remove('show');
      }, 5000);
    }

    // 提交文字
    function submitText() {
      const text = textInput.value.trim();
      if (!text) {
        showError('请输入文字');
        return;
      }

      if (!ws || ws.readyState !== WebSocket.OPEN) {
        showError('未连接到服务器');
        return;
      }

      const message = {
        type: 'text-submit',
        text: text,
      };

      ws.send(JSON.stringify(message));
      console.log('Sent message:', message);

      // 清空输入框
      textInput.value = '';
    }

    // 清除输入
    function clearInput() {
      textInput.value = '';
      result.classList.remove('show');
      error.classList.remove('show');
    }

    // 事件监听
    submitBtn.addEventListener('click', submitText);
    clearBtn.addEventListener('click', clearInput);

    // Ctrl+Enter 快捷提交
    textInput.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'Enter') {
        submitText();
      }
    });

    // 启动连接
    connect();
  </script>
</body>
</html>
