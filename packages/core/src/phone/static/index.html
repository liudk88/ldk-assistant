<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>语音输入</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 状态栏 */
    .status-bar {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #888;
      border-bottom: 1px solid #2a2a4a;
      flex-shrink: 0;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #555;
      flex-shrink: 0;
    }

    .status-dot.connected { background: #4caf50; }
    .status-dot.connecting { background: #ff9800; animation: pulse 1s infinite; }
    .status-dot.error { background: #f44336; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* 输入区域 */
    .input-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 20px;
      gap: 16px;
    }

    .input-hint {
      text-align: center;
      color: #666;
      font-size: 14px;
    }

    textarea {
      width: 100%;
      min-height: 160px;
      max-height: 40vh;
      background: #16213e;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      color: #e0e0e0;
      font-size: 18px;
      padding: 16px;
      resize: vertical;
      outline: none;
      font-family: inherit;
      line-height: 1.6;
    }

    textarea:focus {
      border-color: #0f3460;
    }

    textarea::placeholder {
      color: #555;
    }

    /* 模式切换 */
    .mode-bar {
      display: flex;
      gap: 8px;
      padding: 0 20px;
      flex-shrink: 0;
    }

    .mode-btn {
      flex: 1;
      padding: 8px;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      background: transparent;
      color: #888;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .mode-btn.active {
      background: #0f3460;
      border-color: #0f3460;
      color: #e94560;
      font-weight: 600;
    }

    /* 前缀提示 */
    .prefix-hint {
      text-align: center;
      font-size: 12px;
      color: #555;
      padding: 4px 0;
      flex-shrink: 0;
    }

    /* 提交按钮 */
    .submit-bar {
      padding: 16px 20px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
      flex-shrink: 0;
    }

    .submit-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      background: #e94560;
      color: white;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .submit-btn:active {
      transform: scale(0.97);
      opacity: 0.9;
    }

    .submit-btn:disabled {
      background: #333;
      color: #666;
    }

    /* 结果历史 */
    .history {
      flex: 1;
      overflow-y: auto;
      padding: 12px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
    }

    .history-item {
      padding: 10px 14px;
      border-radius: 10px;
      background: #16213e;
      font-size: 15px;
      line-height: 1.5;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .history-badge {
      flex-shrink: 0;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 600;
      margin-top: 2px;
    }

    .badge-input { background: #1b5e20; color: #81c784; }
    .badge-command { background: #b71c1c; color: #ef9a9a; }
    .badge-error { background: #4a148c; color: #ce93d8; }

    .history-text {
      flex: 1;
      word-break: break-word;
    }

    .history-empty {
      text-align: center;
      color: #444;
      font-size: 14px;
      padding: 40px 0;
    }

    /* 隐藏 */
    .hidden { display: none !important; }

    /* 配置弹窗 */
    .config-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .config-panel {
      background: #16213e;
      border-radius: 16px;
      padding: 24px;
      width: 90%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .config-panel h3 {
      font-size: 18px;
      color: #e0e0e0;
    }

    .config-panel label {
      font-size: 13px;
      color: #888;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .config-panel input {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #2a2a4a;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 16px;
      outline: none;
    }

    .config-panel input:focus { border-color: #0f3460; }

    .config-actions {
      display: flex;
      gap: 8px;
    }

    .config-actions button {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 15px;
      cursor: pointer;
    }

    .btn-save { background: #e94560; color: white; }
    .btn-cancel { background: #2a2a4a; color: #aaa; }
  </style>
</head>
<body>

  <!-- 状态栏 -->
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">连接中...</span>
    <span style="flex:1"></span>
    <button id="configBtn" style="background:none;border:none;color:#555;font-size:20px;cursor:pointer;padding:4px" title="设置">⚙️</button>
  </div>

  <!-- 输入区域 -->
  <div class="input-area" id="inputSection">
    <textarea id="textInput" placeholder="输入文字，或用语音输入法..." autofocus></textarea>
    <div class="prefix-hint">加 "输入" 前缀直接注入文字 · 加 "指令" 前缀执行命令</div>
  </div>

  <!-- 模式栏 -->
  <div class="mode-bar">
    <button class="mode-btn active" data-prefix="">自动判断</button>
    <button class="mode-btn" data-prefix="输入">输入模式</button>
    <button class="mode-btn" data-prefix="指令">指令模式</button>
  </div>

  <!-- 提交栏 -->
  <div class="submit-bar">
    <button class="submit-btn" id="submitBtn">发送</button>
  </div>

  <!-- 结果历史 -->
  <div class="history" id="historySection">
    <div class="history-empty" id="historyEmpty">还没有发送记录</div>
  </div>

  <!-- 配置弹窗 -->
  <div class="config-overlay hidden" id="configOverlay">
    <div class="config-panel">
      <h3>连接设置</h3>
      <label>
        WebSocket 地址
        <input type="text" id="wsUrlInput" placeholder="ws://192.168.1.100:3001">
      </label>
      <div class="config-actions">
        <button class="btn-cancel" id="configCancel">取消</button>
        <button class="btn-save" id="configSave">保存并连接</button>
      </div>
    </div>
  </div>

  <script>
    // === 配置 ===
    const DEFAULT_WS_URL = (() => {
      // 自动推导：用当前页面的 host 替换端口为 3001
      const loc = window.location;
      return `${loc.protocol === 'https:' ? 'wss:' : 'ws:'}//${loc.hostname}:3001`;
    })();

    let wsUrl = localStorage.getItem('wsUrl') || DEFAULT_WS_URL;
    let ws = null;
    let activePrefix = '';

    // === DOM ===
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const textInput = document.getElementById('textInput');
    const submitBtn = document.getElementById('submitBtn');
    const historySection = document.getElementById('historySection');
    const historyEmpty = document.getElementById('historyEmpty');
    const configBtn = document.getElementById('configBtn');
    const configOverlay = document.getElementById('configOverlay');
    const configCancel = document.getElementById('configCancel');
    const configSave = document.getElementById('configSave');
    const wsUrlInput = document.getElementById('wsUrlInput');
    const modeBtns = document.querySelectorAll('.mode-btn');

    // === WebSocket ===
    function connect() {
      setStatus('connecting', '连接中...');

      try {
        ws = new WebSocket(wsUrl);
      } catch (e) {
        setStatus('error', '地址无效');
        return;
      }

      ws.onopen = () => {
        setStatus('connected', '已连接');
      };

      ws.onclose = () => {
        setStatus('error', '已断开');
        // 3秒后自动重连
        setTimeout(connect, 3000);
      };

      ws.onerror = () => {
        setStatus('error', '连接失败');
      };

      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          handleMessage(msg);
        } catch (e) {
          console.error('Parse error:', e);
        }
      };
    }

    function setStatus(state, text) {
      statusDot.className = 'status-dot ' + state;
      statusText.textContent = text;
    }

    function sendMessage(text) {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        addHistoryItem(text, 'error', '未连接');
        return;
      }
      const payload = activePrefix ? `${activePrefix}${text}` : text;
      ws.send(JSON.stringify({ type: 'text-submit', text: payload }));
      textInput.value = '';
      submitBtn.disabled = true;
    }

    function handleMessage(msg) {
      submitBtn.disabled = false;

      if (msg.type === 'result') {
        addHistoryItem(msg.text, msg.intent);
        textInput.value = '';
        textInput.focus();
      } else if (msg.type === 'error') {
        addHistoryItem(msg.message, 'error');
      }
    }

    // === 历史 ===
    function addHistoryItem(text, intent, override) {
      historyEmpty.classList.add('hidden');

      const item = document.createElement('div');
      item.className = 'history-item';

      let badge = '';
      if (override) {
        badge = `<span class="history-badge badge-error">${override}</span>`;
      } else if (intent === 'input') {
        badge = '<span class="history-badge badge-input">输入</span>';
      } else {
        badge = '<span class="history-badge badge-command">指令</span>';
      }

      item.innerHTML = `${badge}<span class="history-text">${escapeHtml(text)}</span>`;
      historySection.insertBefore(item, historySection.firstChild);

      // 最多保留 50 条
      while (historySection.children.length > 51) {
        historySection.removeChild(historySection.lastChild);
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // === 事件 ===
    submitBtn.addEventListener('click', () => {
      const text = textInput.value.trim();
      if (!text) return;
      sendMessage(text);
    });

    textInput.addEventListener('keydown', (e) => {
      // Ctrl+Enter 提交（手机键盘上通常是换行，所以保留 Enter 作为换行）
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        const text = textInput.value.trim();
        if (text) sendMessage(text);
      }
    });

    modeBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        modeBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activePrefix = btn.dataset.prefix;
      });
    });

    // 配置
    configBtn.addEventListener('click', () => {
      wsUrlInput.value = wsUrl;
      configOverlay.classList.remove('hidden');
    });

    configCancel.addEventListener('click', () => {
      configOverlay.classList.add('hidden');
    });

    configOverlay.addEventListener('click', (e) => {
      if (e.target === configOverlay) configOverlay.classList.add('hidden');
    });

    configSave.addEventListener('click', () => {
      const url = wsUrlInput.value.trim();
      if (url) {
        wsUrl = url;
        localStorage.setItem('wsUrl', wsUrl);
        configOverlay.classList.add('hidden');
        if (ws) ws.close();
        connect();
      }
    });

    // === 启动 ===
    connect();
  </script>
</body>
</html>
